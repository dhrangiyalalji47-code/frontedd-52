<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>example of script</h1>
    <h3>example of addition,siubstraction,multiplication,division</h3>
    <script>

        let num1 = prompt("enter your frist number", 1);
        let num2 = prompt("enter your second number", 1);

        num1 = parseInt(num1);
        num2 = parseInt(num2);

        let addition = num1 + num2;
        let substraction = num1 - num2;
        let multiplication = num1 * num2;
        let division = num1 / num2;

        alert("addtion : "+addition);
        alert("substraction : "+substraction);
        alert("multiplication : "+multiplication);
        alert("division : "+division);
    </script>
</body>

</html>
