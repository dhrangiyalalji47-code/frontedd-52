<!DOCTYPE html>
<html lang="en">

<body>
    <h1>deflote argument</h1>
    <script>
        function getvolume(langth,width=1,depth=1){
            console.log(langth,width,depth);
            //local variable (only accible in function)
            let temp=langth*width*depth;
            return temp;
        }
        var langth=10;
        var width=5;
        var depth=2;
        let volume=getvolume(langth,width,depth);
console.log("volume="+volume);
        //2nd call
        volume=getvolume(langth,width);
        console.log("volume="+volume);
        //3rd call
        volume=getvolume(langth);
        console.log("volume="+volume);
        
        
        
    </script>
</body>
