<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <button type="button" onclick="printtable()">generate multiplication table</button>
     <script>
        function printtable(){
         console.log(' printtable function is called........');

         var num=prompt("enter  one number",1);
         num=parseInt(num);
         var Multiplier=1;
         var result=0;

         while(Multiplier <= 10)
         {
            var result=num*Multiplier;
            document.write(`${num}*${Multiplier}=${result}<br/>`);
            Multiplier=Multiplier+1;
         }


        }
     </script>
</body>
</html>
