<body>
    <h1>variable</h1>
   <script>
         let name = "lalji dhrangiya";
         let year = 20;
         let pi = 3.14;
         let gander = true;
           
         alert(name);
         alert(year);
         alert(pi);
         alert(gander);

         name = 100;
         year = "twent five";
         gander = true;

         alert(name);
         alert(year);
         alert(gander);




   </script>
